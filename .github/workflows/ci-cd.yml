name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

  audit-preview:
    name: Unlighthouse audit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Start static preview server
        run: npx -y -p serve serve dist -l 3000 &

      - name: Wait for preview
        run: npx -y -p wait-on wait-on http://127.0.0.1:3000

      - name: Run Unlighthouse
        run: npx -y -p @unlighthouse/cli -p puppeteer unlighthouse-ci --site http://127.0.0.1:3000 --budget 75 --build-static

      - name: Upload Unlighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unlighthouse-report
          path: .unlighthouse
          if-no-files-found: ignore
